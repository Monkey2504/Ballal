      rel="stylesheet"
    />

    <style>
      /* ── Design tokens ──────────────────────────────── */
      :root {
        --crimson:   #BE0000;
        --gold:      #FFCC00;
        --emerald:   #00843D;
        --ivory:     #FAFAF8;
        --ink:       #0F0F0F;
        --ink-muted: #6B6B6B;
        --border:    #E8E8E6;

        --radius:    12px;
        --radius-lg: 20px;

        --shadow-sm: 0 1px 3px rgba(0,0,0,0.05), 0 2px 8px rgba(0,0,0,0.04);
        --shadow-md: 0 1px 3px rgba(0,0,0,0.05), 0 4px 16px rgba(0,0,0,0.06);
        --shadow-lg: 0 8px 32px rgba(0,0,0,0.08), 0 2px 6px rgba(0,0,0,0.04);
      }

      /* ── Global base ────────────────────────────────── */
      *, *::before, *::after { box-sizing: border-box; }

      body {
        scroll-behavior: smooth;
        background-color: var(--ivory);
        color: var(--ink);
        margin: 0;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      #root { min-height: 100vh; }

      /* ── Guinea flag line ───────────────────────────── */
      .flag-line {
        display: flex;
        width: 100%;
        height: 3px;
      }
      .flag-line > span {
        flex: 1;
        display: block;
      }
      .flag-line > span:nth-child(1) { background: var(--crimson); }
      .flag-line > span:nth-child(2) { background: var(--gold); }
      .flag-line > span:nth-child(3) { background: var(--emerald); }

      /* ── WCAG skip-to-content ───────────────────────── */
      .sr-only {
        position: absolute; width: 1px; height: 1px;
        padding: 0; margin: -1px; overflow: hidden;
        clip: rect(0,0,0,0); white-space: nowrap; border-width: 0;
      }
      .sr-only.focus\:not-sr-only:focus, .sr-only:focus {
        position: absolute; width: auto; height: auto;
        padding: 0.5rem 1rem; margin: 0; overflow: visible;
        clip: auto; white-space: normal;
      }

      /* ── Framer-motion helpers ──────────────────────── */
      [data-motion-safe] { will-change: transform, opacity; }
    </style>

    <!-- Tailwind CDN avec config personnalisée -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'guinea-red':      '#BE0000',
              'guinea-red-dark': '#9B0000',
              'guinea-yellow':   '#FFCC00',
              'guinea-green':    '#00843D',
              'ivory':           '#FAFAF8',
              'ink':             '#0F0F0F',
              'ink-muted':       '#6B6B6B',
              'border-subtle':   '#E8E8E6',
            },
            fontFamily: {
              sans:  ['Plus Jakarta Sans', 'sans-serif'],
              serif: ['Playfair Display', 'serif'],
            },
            fontSize: {
              'caption': ['9px',  { lineHeight: '1.4', letterSpacing: '0.06em' }],
              'label':   ['10px', { lineHeight: '1.4', letterSpacing: '0.28em' }],
              'badge':   ['11px', { lineHeight: '1.4', letterSpacing: '0.14em' }],
              'body-sm': ['13px', { lineHeight: '1.6' }],
              'body-lg': ['17px', { lineHeight: '1.75' }],
            },
            boxShadow: {
              'soft-elegant': '0 1px 3px rgba(0,0,0,0.05), 0 4px 16px rgba(0,0,0,0.06)',
              'soft-sm':      '0 1px 3px rgba(0,0,0,0.04), 0 2px 8px rgba(0,0,0,0.04)',
              'soft-lg':      '0 8px 32px rgba(0,0,0,0.08), 0 2px 6px rgba(0,0,0,0.04)',
              'soft-xl':      '0 16px 48px rgba(0,0,0,0.10), 0 4px 12px rgba(0,0,0,0.05)',
            },
            borderRadius: {
              'token':    '8px',
              'token-lg': '12px',
              'token-xl': '20px',
            },
            keyframes: {
              'fade-in': {
                '0%':   { opacity: '0', transform: 'translateY(12px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              'slide-in-right': {
                '0%':   { opacity: '0', transform: 'translateX(24px)' },
                '100%': { opacity: '1', transform: 'translateX(0)' },
              },
            },
            animation: {
              'fade-in':        'fade-in 0.4s ease-out forwards',
              'slide-in-right': 'slide-in-right 0.35s ease-out forwards',
            },
          }
        }
      }
    </script>
